# ============================================================
# 生产环境配置
# ============================================================
server:
  port: 80

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/study     # 数据库连接地址
    username: root                              # 数据库用户名
    password: 12345678                          # 数据库密码
    driver-class-name: com.mysql.cj.jdbc.Driver # MySQL 驱动类

  # ============================================================
  # Redis 配置
  # ============================================================
  data:
    redis:
      host: localhost  # Redis 服务器地址
      port: 6379       # Redis 端口

  # ============================================================
  # 邮件服务配置（生产环境请替换为真实 SMTP 服务器）
  # ============================================================
  mail:
    host: smtp.163.com                         # 生产环境 SMTP 服务器
    port: 465                                  # SMTP SSL 端口
    username: your-email@example.com           # 发件邮箱地址
    password: your-smtp-authorization-code     # SMTP 授权码（非邮箱密码）

  # ============================================================
  # RabbitMQ 消息队列配置
  # ============================================================
  rabbitmq:
    addresses: localhost                     # 服务端地址
    username: admin                          # 登录用户名
    password: admin                          # 登录密码
    virtual-host: /                          # 虚拟主机

  # ============================================================
  # JWT 令牌配置
  # ============================================================
  security:
    jwt:
      key: abc123            # JWT 签名密钥（生产环境请更换为复杂密钥）
      expire: 72             # JWT 过期时间（小时）
      limit:
        base: 10             # 登录冷却基础时间（秒）
        upgrade: 300         # 刷令牌封禁升级时间（秒）
        frequency: 30        # 触发升级的请求频次

  # ============================================================
  # 跨域（CORS）配置
  # ============================================================
  web:
    cors:
      origin: 'http://your-frontend-domain.com'  # 生产环境限制为前端域名
      credentials: true                          # 允许携带凭证
      methods: 'GET,POST,PUT,DELETE,OPTIONS'

    # ============================================================
    # 验证码相关配置
    # ============================================================
    verify:
      mail-limit: 60     # 同一 IP 请求邮件验证码的冷却时间（秒）

    # ============================================================
    # 请求限流配置（生产环境更严格）
    # ============================================================
    flow:
      period: 3          # 请求计数周期（秒）
      limit: 10          # 周期内最大请求次数（生产环境收紧）
      block: 60          # 超限封禁时间（秒）
