# ============================================================
# 数据库配置（MySQL）
# ============================================================
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/test     # 数据库连接地址
    username: root                              # 数据库用户名
    password: 12345678                          # 数据库密码
    driver-class-name: com.mysql.cj.jdbc.Driver # MySQL 驱动类

  # ============================================================
  # Redis 配置
  # ============================================================
  data:
    redis:
      host: localhost  # Redis 服务器地址
      port: 6379       # Redis 端口

  # ============================================================
  # JWT 令牌配置
  # ============================================================
  security:
    jwt:
      key: abc123      # JWT 签名密钥
      expire: 3600     # JWT 过期时间（小时）

  # ============================================================
  # 跨域（CORS）配置
  # ============================================================
  web:
    cors:
      origin: '*'        # 允许的来源（* 表示允许所有域名）
      credentials: false # 是否允许携带凭证（Cookie、Authorization 头等）
      methods: '*'       # 允许的 HTTP 方法（* 表示允许所有方法）