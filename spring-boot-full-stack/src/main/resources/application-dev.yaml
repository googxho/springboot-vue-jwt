# ============================================================
# Swagger/OpenAPI 文档配置
# ============================================================
# 注意：springdoc v3.x 默认关闭了 /v3/api-docs 和 /swagger-ui，需显式启用
springdoc:
  api-docs:
    enabled: true                 # 启用 /v3/api-docs 端点
  swagger-ui:
    enabled: true                 # 启用 Swagger UI 页面
    operations-sorter: alpha      # 接口按字母顺序排序
  paths-to-match: /api/**         # 只扫描 /api/ 路径下的接口

# ============================================================
# 数据库配置（MySQL）
# ============================================================
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/study     # 数据库连接地址
    username: root                              # 数据库用户名
    password: 12345678                          # 数据库密码
    driver-class-name: com.mysql.cj.jdbc.Driver # MySQL 驱动类

  # ============================================================
  # Redis 配置
  # ============================================================
  data:
    redis:
      host: localhost  # Redis 服务器地址
      port: 6379       # Redis 端口

  # ============================================================
  # 邮件服务配置（Mailpit — 开发用假邮件服务器）
  # ============================================================
  # Mailpit 是一个专为开发环境设计的邮件服务器，它会"收下"你的邮件但不会真发出去。
  # 你可以在浏览器打开 http://localhost:8025 查看所有"已发送"的邮件内容。
  #
  # 跟真实邮箱（163/Gmail 等）对比：
  #   - Mailpit：不需要账号密码/不需要联网/不会发丢/随时查看
  #   - 真实邮箱：需要账号+授权码/需要联网/可能发到垃圾箱
  #
  # 开发阶段用 Mailpit，上线前再换成真实的 SMTP 服务器。
  # Mailpit 安装方式（在 flyenv 里已预装）：
  #   brew install mailpit
  #   brew services start mailpit
  mail:
    host: localhost                          # Mailpit 在本机运行
    port: 1025                               # Mailpit SMTP 端口（默认 1025）
    username:                                # Mailpit 不需要认证，留空即可
    password:                                # Mailpit 不需要认证，留空即可

  # ============================================================
  # RabbitMQ 消息队列配置
  # ============================================================
  rabbitmq:
    addresses: localhost                     # 服务端地址
    username: guest                          # 登录用户名
    password: guest                          # 登录密码
    virtual-host: /                          # 虚拟主机

  # ============================================================
  # JWT 令牌配置
  # ============================================================
  security:
    jwt:
      key: abc123            # JWT 签名密钥
      expire: 3600           # JWT 过期时间（小时）
      limit:
        base: 10             # 登录冷却基础时间（秒）
        upgrade: 300         # 刷令牌封禁升级时间（秒）
        frequency: 30        # 触发升级的请求频次

  # ============================================================
  # 跨域（CORS）配置
  # ============================================================
  web:
    cors:
      origin: '*'        # 允许的来源（* 表示允许所有域名）
      credentials: false # 是否允许携带凭证（Cookie、Authorization 头等）
      methods: '*'       # 允许的 HTTP 方法（* 表示允许所有方法）

    # ============================================================
    # 验证码相关配置
    # ============================================================
    verify:
      mail-limit: 60     # 同一 IP 请求邮件验证码的冷却时间（秒）

    # ============================================================
    # 请求限流配置
    # ============================================================
    flow:
      period: 3          # 请求计数周期（秒）
      limit: 50          # 周期内最大请求次数
      block: 30          # 超限封禁时间（秒）
